/* ============================================================================
   SAGKEENG COMMUNITY CALENDAR  —  "Signal Fire" design system
   ============================================================================
   The idea: the warm glow of a gathering fire against the deep blue of the
   river at dusk. Fire is the brand (Signal Fire) and the sacred centre of the
   gathering. Warmth draws people in; the river grounds it in this place.

   Display: Fraunces (warm optical serif).  Body/UI: Hanken Grotesk.
   Re-theme everything from the tokens in :root.
   ============================================================================ */

/* ── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
  /* Neutrals — warm, clean (not the usual AI cream) */
  --ink:        #1c1714;
  --ink-2:      #534a42;
  --ink-3:      #8a7f74;
  --paper:      #faf8f4;
  --paper-2:    #f3efe7;
  --paper-3:    #ece6da;
  --line:       #e4ddd0;
  --line-2:     #d6cdbd;

  /* Signal fire — the warmth */
  --ember:      #e8602c;
  --ember-deep: #c2461a;
  --amber:      #f5a623;
  --amber-soft: #ffce7a;

  /* River — the depth */
  --river:      #1c4651;
  --river-2:    #163840;
  --night:      #0e1c20;
  --night-2:    #132a30;

  /* Category accents (refined, not crayon) */
  --c-culture: #b8791a;
  --c-health:  #3d7355;
  --c-youth:   #2d6b7a;
  --c-elders:  #7e3a5c;
  --c-family:  #b0653f;
  --c-special: #e8602c;

  /* Surfaces */
  --bg:        var(--paper);
  --surface:   #ffffff;
  --surface-2: var(--paper-2);
  --text:      var(--ink);
  --text-soft: var(--ink-2);
  --text-faint:var(--ink-3);
  --border:    var(--line);

  /* Depth */
  --sh-sm: 0 1px 2px rgba(28,23,20,.05);
  --sh-md: 0 2px 4px rgba(28,23,20,.04), 0 10px 28px rgba(28,23,20,.07);
  --sh-lg: 0 8px 24px rgba(28,23,20,.10), 0 24px 64px rgba(28,23,20,.16);
  --glow:  0 0 40px rgba(245,166,35,.28);

  /* Type */
  --display: "Fraunces", Georgia, "Times New Roman", serif;
  --body:    "Hanken Grotesk", system-ui, -apple-system, sans-serif;

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;
  --wrap: 880px;
}

[data-theme="dark"] {
  --bg:        var(--night);
  --surface:   #16282e;
  --surface-2: #1b3138;
  --text:      #f3ede2;
  --text-soft: #c3b8a8;
  --text-faint:#8f8576;
  --border:    #244149;
  --line:      #244149;
  --line-2:    #2d4f58;
  --paper-2:   #1b3138;
  --sh-sm: 0 1px 2px rgba(0,0,0,.3);
  --sh-md: 0 2px 6px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.4);
  --sh-lg: 0 12px 48px rgba(0,0,0,.55);
}

/* ── RESET ───────────────────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  font-size: 16px; line-height: 1.6;
  font-feature-settings: "ss01";
  -webkit-font-smoothing: antialiased;
  transition: background .35s, color .35s;
}
img { display: block; max-width: 100%; }
button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
.ic { flex-shrink: 0; vertical-align: -2px; }
.ic.flip { transform: scaleX(-1); }
.is-hidden { display: none !important; }

/* ── BANNER ──────────────────────────────────────────────────────────────── */
.banner {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 22px; background: var(--ink); color: var(--paper);
  font-size: 13.5px; font-weight: 500; position: relative; z-index: 40;
}
.banner__pulse {
  width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0;
  box-shadow: 0 0 0 0 rgba(245,166,35,.6); animation: pulse 2.6s infinite;
}
@keyframes pulse { 70%{box-shadow:0 0 0 9px rgba(245,166,35,0);} 100%{box-shadow:0 0 0 0 rgba(245,166,35,0);} }
.banner__close { margin-left: auto; font-size: 19px; opacity: .65; padding: 2px 4px; }
.banner__close:hover { opacity: 1; }

/* ── HERO ────────────────────────────────────────────────────────────────── */
.hero { position: relative; min-height: 580px; display: flex; flex-direction: column; color: #f6f1e9; overflow: hidden; }
.hero__slides { position: absolute; inset: 0; z-index: 0; background: var(--night); }
.hero__slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.4s ease; transform: scale(1.04); }
.hero__slide.is-active { opacity: 1; animation: kenburns 8s ease-out forwards; }
@keyframes kenburns { from { transform: scale(1.08); } to { transform: scale(1.0); } }
.hero__slide img { width: 100%; height: 100%; object-fit: cover; }
.hero::after {
  content: ""; position: absolute; inset: 0; z-index: 1;
  background:
    radial-gradient(120% 80% at 70% 25%, rgba(245,166,35,.18), transparent 55%),
    linear-gradient(180deg, rgba(14,28,32,.62) 0%, rgba(14,28,32,.20) 32%, rgba(14,28,32,.55) 72%, rgba(14,28,32,.88) 100%);
}
.hero__inner {
  position: relative; z-index: 2; width: 100%; max-width: var(--wrap);
  margin: 0 auto; padding: 30px 24px 0; display: flex; flex-direction: column; flex: 1;
}
.hero__top { display: flex; align-items: flex-start; gap: 20px; }

.hero__crest { position: relative; width: 78px; height: 78px; flex-shrink: 0; display: grid; place-items: center; }
.hero__crest::before {
  content: ""; position: absolute; inset: -14px; border-radius: 50%;
  background: radial-gradient(circle, rgba(245,166,35,.55), rgba(245,166,35,0) 70%);
  animation: emberbreath 5s ease-in-out infinite;
}
@keyframes emberbreath { 0%,100%{opacity:.55; transform:scale(1);} 50%{opacity:.9; transform:scale(1.08);} }
.hero__crest img { position: relative; width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 14px rgba(0,0,0,.45)); }

.hero__titles { flex: 1; padding-top: 4px; }
.hero__nation { font-size: 12px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; opacity: .92; }
.hero__title {
  font-family: var(--display); font-optical-sizing: auto;
  font-size: clamp(2.5rem, 6.5vw, 3.9rem); line-height: .98; font-weight: 500;
  margin: 5px 0 8px; letter-spacing: -.01em; text-shadow: 0 2px 30px rgba(0,0,0,.35);
}
.hero__sub { font-family: var(--display); font-style: italic; font-weight: 400; font-size: 1.12rem; opacity: .94; }

.hero__tools { display: flex; gap: 8px; align-items: center; }
.hero__btn {
  display: inline-flex; align-items: center; gap: 7px; height: 40px; padding: 0 15px;
  border-radius: 999px; font-size: 13px; font-weight: 600;
  backdrop-filter: blur(10px); background: rgba(246,241,233,.14);
  border: 1px solid rgba(246,241,233,.26); color: #f6f1e9; transition: background .2s, transform .2s;
}
.hero__btn:hover { background: rgba(246,241,233,.26); transform: translateY(-1px); }
.hero__icon { width: 40px; padding: 0; justify-content: center; font-size: 16px; }

.hero__strips { margin-top: auto; padding-top: 26px; }
.strip {
  display: flex; align-items: center; gap: 13px; padding: 13px 0; font-size: 13px;
  border-top: 1px solid rgba(246,241,233,.16);
}
.strip__temp { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
.strip__icon { font-size: 22px; }
.strip__main { display: block; font-weight: 600; }
.strip__sub { display: block; font-size: 11.5px; opacity: .72; }
.strip:last-of-type .strip__sub { font-style: italic; }

.hero__dots { display: flex; gap: 7px; justify-content: center; padding: 16px 0; }
.hero__dot { width: 8px; height: 8px; border-radius: 999px; background: rgba(246,241,233,.4); transition: all .35s; }
.hero__dot.is-active { width: 28px; background: var(--amber); }

/* ── TABS ────────────────────────────────────────────────────────────────── */
.tabs { position: sticky; top: 0; z-index: 30; background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--sh-sm); }
.tabs__inner { max-width: var(--wrap); margin: 0 auto; display: flex; gap: 2px; padding: 0 16px; overflow-x: auto; scrollbar-width: none; }
.tabs__inner::-webkit-scrollbar { display: none; }
.tab { position: relative; padding: 17px 16px 15px; font-size: 14px; font-weight: 600; color: var(--text-soft); white-space: nowrap; transition: color .2s; }
.tab:hover { color: var(--text); }
.tab.is-active { color: var(--ember); }
.tab.is-active::after { content: ""; position: absolute; left: 12px; right: 12px; bottom: 0; height: 3px; border-radius: 3px 3px 0 0; background: var(--ember); }

/* ── MAIN ────────────────────────────────────────────────────────────────── */
.main { max-width: var(--wrap); margin: 0 auto; padding: 28px 24px 90px; }

/* Search */
.search { position: relative; margin-bottom: 16px; }
.search .ic { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }
.search input {
  width: 100%; height: 52px; padding: 0 46px; border: 1.5px solid var(--border);
  border-radius: 999px; background: var(--surface); color: var(--text); font-size: 15px;
  font-family: var(--body); transition: border-color .2s, box-shadow .2s;
}
.search input::placeholder { color: var(--text-faint); }
.search input:focus { outline: none; border-color: var(--ember); box-shadow: 0 0 0 4px rgba(232,96,44,.12); }
.search__clear { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 26px; height: 26px; border-radius: 50%; color: var(--text-faint); font-size: 17px; opacity: 0; pointer-events: none; transition: opacity .2s; }
.search__clear.is-visible { opacity: 1; pointer-events: auto; }

/* Word of the day */
.wotd {
  display: flex; gap: 15px; align-items: flex-start; padding: 17px 19px; margin-bottom: 22px;
  background:
    radial-gradient(140% 120% at 0% 0%, rgba(245,166,35,.14), transparent 55%),
    var(--surface);
  border: 1px solid var(--border); border-radius: var(--r-md); box-shadow: var(--sh-sm);
}
.wotd__feather { font-size: 25px; line-height: 1.3; }
.wotd__word { font-family: var(--display); font-size: 1.5rem; line-height: 1.05; display: block; }
.wotd__en { display: block; font-size: 13px; font-weight: 700; color: var(--ember); margin: 1px 0 5px; }
.wotd__note { display: block; font-size: 13px; color: var(--text-soft); }

/* Filters */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
.filter { height: 37px; padding: 0 16px; border: 1.5px solid var(--border); border-radius: 999px; background: var(--surface); font-size: 13px; font-weight: 600; color: var(--text-soft); transition: all .18s; }
.filter:hover { border-color: var(--text-faint); color: var(--text); }
.filter.is-active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
[data-theme="dark"] .filter.is-active { background: var(--ember); border-color: var(--ember); color: #fff; }

/* Section label */
.seclabel { font-family: var(--display); font-weight: 500; font-size: 1.55rem; letter-spacing: -.01em; margin: 36px 0 18px; }
.seclabel:first-child { margin-top: 2px; }

/* ── RIVER SPINE (signature) ─────────────────────────────────────────────── */
.river { position: relative; }
.river__row { display: flex; gap: 16px; position: relative; }
.river__rail { position: relative; width: 16px; flex-shrink: 0; display: flex; justify-content: center; }
.river__rail::before { content: ""; position: absolute; top: 0; bottom: -18px; width: 2px; background: linear-gradient(var(--amber), var(--ember)); opacity: .35; }
.river__row:last-child .river__rail::before { bottom: 50%; }
.river__node { position: absolute; top: 30px; width: 14px; height: 14px; border-radius: 50%; background: var(--surface); border: 3px solid var(--c-special); box-shadow: 0 0 0 4px var(--bg); z-index: 1; }
.river__node[data-cat="culture"]{ border-color: var(--c-culture); }
.river__node[data-cat="health"] { border-color: var(--c-health); }
.river__node[data-cat="youth"]  { border-color: var(--c-youth); }
.river__node[data-cat="elders"] { border-color: var(--c-elders); }
.river__node[data-cat="family"] { border-color: var(--c-family); }
.river__node[data-cat="special"]{ border-color: var(--c-special); }
.river__content { flex: 1; min-width: 0; padding-bottom: 16px; }
.river__date { font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 7px; }
.river__date strong { color: var(--text); font-size: 13px; }

/* ── CARD ────────────────────────────────────────────────────────────────── */
.card {
  position: relative; display: flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-md); overflow: hidden; margin-bottom: 14px; box-shadow: var(--sh-md);
  transition: transform .2s cubic-bezier(.2,.8,.3,1), box-shadow .2s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--sh-lg); }
.card__rail { width: 5px; flex-shrink: 0; background: var(--c-special); }
.card[data-cat="culture"] .card__rail{ background: var(--c-culture); }
.card[data-cat="health"]  .card__rail{ background: var(--c-health); }
.card[data-cat="youth"]   .card__rail{ background: var(--c-youth); }
.card[data-cat="elders"]  .card__rail{ background: var(--c-elders); }
.card[data-cat="family"]  .card__rail{ background: var(--c-family); }
.card[data-cat="special"] .card__rail{ background: var(--c-special); }

.card--featured { box-shadow: var(--sh-md), inset 0 1px 0 rgba(245,166,35,.4); }
.card--featured::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(180deg, rgba(245,166,35,.10), transparent); pointer-events: none;
}
.card--live { border-color: rgba(232,96,44,.5); box-shadow: var(--sh-md), var(--glow); }

.card__body { flex: 1; padding: 17px 19px; min-width: 0; }
.card__tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 9px; }
.pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; letter-spacing: .01em; padding: 3px 10px; border-radius: 999px; }
.pill--live { background: var(--ember); color: #fff; }
.pill--live .dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse2 1.4s infinite; }
@keyframes pulse2 { 50%{opacity:.4;} }
.pill--soon { background: rgba(245,166,35,.18); color: #9a6c14; }
.pill--moon { background: rgba(28,70,81,.12); color: var(--river); }
.pill--muted{ background: var(--surface-2); color: var(--text-soft); }
[data-theme="dark"] .pill--soon { color: var(--amber); }
[data-theme="dark"] .pill--moon { color: #7fb0bd; background: rgba(127,176,189,.14); }

.card__title { font-family: var(--display); font-weight: 500; font-size: 1.32rem; line-height: 1.18; letter-spacing: -.01em; }
.card__meta { display: flex; flex-wrap: wrap; gap: 5px 16px; margin: 9px 0 10px; font-size: 13px; color: var(--text-soft); }
.card__meta-item { display: inline-flex; align-items: center; gap: 5px; }
.card__meta-item .ic { opacity: .6; }
.card__info { font-size: 14.5px; color: var(--text-soft); line-height: 1.55; }
.card__foot { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; margin-top: 12px; font-size: 12.5px; color: var(--text-faint); }
.card__spots { display: inline-flex; align-items: center; gap: 5px; font-weight: 700; color: var(--ember-deep); background: rgba(232,96,44,.1); padding: 4px 10px; border-radius: 999px; }
.card__spots .ic { opacity: .8; }
[data-theme="dark"] .card__spots { color: var(--amber); background: rgba(245,166,35,.12); }

.card__actions { display: flex; gap: 8px; align-items: center; margin-top: 15px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; height: 42px; padding: 0 20px; border-radius: 999px; font-size: 14px; font-weight: 700; font-family: var(--body); white-space: nowrap; transition: all .18s; }
.btn--rsvp { background: var(--ember); color: #fff; box-shadow: 0 2px 10px rgba(232,96,44,.3); }
.btn--rsvp:hover { background: var(--ember-deep); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,96,44,.4); }
.btn--rsvp.is-going { background: var(--c-health); box-shadow: none; }
.btn--icon { width: 42px; padding: 0; background: var(--surface-2); color: var(--text-soft); border: 1px solid var(--border); }
.btn--icon:hover { color: var(--ember); border-color: var(--ember); }
.btn--icon .ic { vertical-align: 0; }
.btn--primary { width: 100%; height: 52px; background: var(--ember); color: #fff; font-size: 15px; margin-top: 4px; box-shadow: 0 4px 18px rgba(232,96,44,.32); }
.btn--primary:hover { background: var(--ember-deep); box-shadow: 0 6px 24px rgba(232,96,44,.42); }
.btn--lg { height: 56px; font-size: 16px; }
.btn--text { width: 100%; background: none; color: var(--text-soft); height: 44px; font-weight: 600; font-size: 13.5px; }
.btn--text:hover { color: var(--ember); }

/* ── DAY GROUPS ──────────────────────────────────────────────────────────── */
.daygroup { margin-bottom: 30px; }
.daygroup__head { display: flex; align-items: center; gap: 11px; font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--text-faint); padding-bottom: 11px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.daygroup__head.is-today { color: var(--ember); border-color: rgba(232,96,44,.4); }
.badge { font-size: 10px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; background: var(--ember); color: #fff; padding: 3px 9px; border-radius: 999px; }

/* ── CALENDAR ────────────────────────────────────────────────────────────── */
.cal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 22px; box-shadow: var(--sh-md); }
.cal__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.cal__title { font-family: var(--display); font-weight: 500; font-size: 1.5rem; }
.cal__nav { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--border); color: var(--text-soft); display: grid; place-items: center; transition: all .18s; }
.cal__nav:hover { border-color: var(--ember); color: var(--ember); }
.cal__grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.cal__grid--names { margin-bottom: 6px; }
.cal__name { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-faint); padding: 4px 0; }
.cal__cell { position: relative; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: 1.5px solid transparent; border-radius: var(--r-sm); background: var(--surface-2); font-size: 14px; transition: all .15s; }
.cal__cell--empty { background: transparent; }
.cal__cell.has-events { cursor: pointer; }
.cal__cell.has-events:hover { border-color: var(--ember); transform: translateY(-1px); }
.cal__cell.is-today { background: rgba(232,96,44,.1); color: var(--ember); }
.cal__cell.is-today .cal__num { font-weight: 800; }
.cal__cell.is-picked { background: var(--ink); color: var(--paper); }
[data-theme="dark"] .cal__cell.is-picked { background: var(--ember); color: #fff; }
.cal__num { font-weight: 600; font-variant-numeric: tabular-nums; }
.cal__moon { position: absolute; top: 5px; right: 6px; font-size: 6px; color: var(--river); }
[data-theme="dark"] .cal__moon { color: var(--amber-soft); }
.cal__dots { display: flex; gap: 3px; }
.cal__dot { width: 5px; height: 5px; border-radius: 50%; background: var(--c-special); }
.cal__dot[data-cat="culture"]{ background: var(--c-culture); }
.cal__dot[data-cat="health"] { background: var(--c-health); }
.cal__dot[data-cat="youth"]  { background: var(--c-youth); }
.cal__dot[data-cat="elders"] { background: var(--c-elders); }
.cal__dot[data-cat="family"] { background: var(--c-family); }
.cal__dot[data-cat="special"]{ background: var(--c-special); }
.cal__hint { text-align: center; font-size: 13px; color: var(--text-faint); margin-top: 20px; }
.picked { margin-top: 26px; }
.picked__title { font-family: var(--display); font-weight: 500; font-size: 1.4rem; margin-bottom: 16px; }
.picked__empty { color: var(--text-faint); font-size: 14px; }

/* ── NEWS ────────────────────────────────────────────────────────────────── */
.news { background: var(--surface); border: 1px solid var(--border); border-left: 5px solid var(--c-special); border-radius: var(--r-md); padding: 17px 19px; margin-bottom: 14px; box-shadow: var(--sh-sm); transition: transform .18s; }
.news:hover { transform: translateX(3px); }
.news[data-type="advisory"]{ border-left-color: var(--ember); }
.news[data-type="council"] { border-left-color: var(--c-youth); }
.news[data-type="roads"]   { border-left-color: var(--amber); }
.news[data-type="jobs"]    { border-left-color: var(--c-health); }
.news[data-type="health"]  { border-left-color: var(--c-elders); }
.news[data-type="culture"] { border-left-color: var(--c-culture); }
.news__type { display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
.news__title { font-family: var(--display); font-weight: 500; font-size: 1.2rem; margin-bottom: 5px; }
.news__info { font-size: 14.5px; color: var(--text-soft); line-height: 1.55; }
.news__time { display: block; font-size: 12px; color: var(--text-faint); margin-top: 9px; }

/* ── EMPTY ───────────────────────────────────────────────────────────────── */
.empty { text-align: center; padding: 56px 20px; }
.empty__icon { font-size: 46px; margin-bottom: 14px; }
.empty__title { font-family: var(--display); font-weight: 500; font-size: 1.5rem; margin-bottom: 6px; }
.empty__note { color: var(--text-soft); font-size: 14.5px; }

/* ── MODAL (RSVP) ────────────────────────────────────────────────────────── */
.modal, .welcome { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal.is-open, .welcome.is-open { display: flex; }
.modal__backdrop, .welcome__backdrop { position: absolute; inset: 0; background: rgba(14,28,32,.6); backdrop-filter: blur(4px); }
.modal__box { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 30px; max-width: 460px; width: 100%; box-shadow: var(--sh-lg); animation: rise .32s cubic-bezier(.16,1,.3,1); max-height: 90vh; overflow-y: auto; }
@keyframes rise { from { opacity: 0; transform: translateY(20px) scale(.98); } to { opacity: 1; transform: none; } }
.modal__close { position: absolute; top: 16px; right: 16px; width: 34px; height: 34px; border-radius: 50%; color: var(--text-soft); background: var(--surface-2); display: grid; place-items: center; transition: all .2s; z-index: 2; }
.modal__close:hover { color: var(--text); transform: rotate(90deg); }

.rsvp__eyebrow { font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--ember); }
.rsvp__title { font-family: var(--display); font-weight: 500; font-size: 1.85rem; line-height: 1.08; letter-spacing: -.01em; margin: 6px 0 12px; }
.rsvp__when { font-size: 14px; color: var(--text-soft); line-height: 1.7; padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
.rsvp__when .ic { opacity: .6; margin-right: 4px; }
.rsvp__label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.field-row { display: flex; gap: 8px; margin-bottom: 8px; }
.field { flex: 1; height: 50px; padding: 0 16px; border: 1.5px solid var(--border); border-radius: var(--r-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: var(--body); transition: border-color .18s, box-shadow .18s; min-width: 0; }
.field::placeholder { color: var(--text-faint); }
.field:focus { outline: none; border-color: var(--ember); box-shadow: 0 0 0 3px rgba(232,96,44,.12); }
.field-remove { width: 50px; flex-shrink: 0; border: 1.5px solid var(--border); border-radius: var(--r-sm); color: var(--text-faint); display: grid; place-items: center; transition: all .18s; }
.field-remove:hover { color: var(--ember); border-color: var(--ember); }
.rsvp__add { font-size: 13.5px; font-weight: 600; color: var(--ember); padding: 8px 2px; }
.rsvp__add:hover { text-decoration: underline; }
.rsvp__hint { font-size: 12.5px; color: var(--text-faint); line-height: 1.5; margin: 6px 0 16px; }
.rsvp__error { color: var(--ember-deep); font-size: 13px; font-weight: 600; min-height: 18px; margin-bottom: 6px; }
[data-theme="dark"] .rsvp__error { color: #ff9a6e; }

/* RSVP success */
.rsvp--done { text-align: center; padding: 8px 0; }
.rsvp__seal { width: 72px; height: 72px; margin: 0 auto 16px; border-radius: 50%; background: var(--c-health); color: #fff; display: grid; place-items: center; box-shadow: 0 0 0 8px rgba(61,115,85,.14); animation: pop .4s cubic-bezier(.16,1.3,.4,1); }
.rsvp__seal .ic { width: 32px; height: 32px; stroke-width: 2; }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
.rsvp__done-event { font-size: 16px; font-weight: 700; margin-bottom: 16px; line-height: 1.4; }
.rsvp__done-event span { font-weight: 500; color: var(--text-soft); font-size: 14px; }
.rsvp__entry { display: inline-block; font-size: 13px; font-weight: 700; color: var(--amber); background: rgba(245,166,35,.14); padding: 8px 16px; border-radius: 999px; margin-bottom: 18px; }
.rsvp__contact { font-size: 13px; color: var(--text-soft); margin-bottom: 8px; }

/* ── WELCOME (Treaty Days) ───────────────────────────────────────────────── */
.welcome__box { position: relative; background: linear-gradient(165deg, var(--night-2), var(--night)); border: 1px solid rgba(245,166,35,.2); border-radius: var(--r-xl); padding: 40px 32px 32px; max-width: 460px; width: 100%; text-align: center; color: #f6f1e9; box-shadow: var(--sh-lg); overflow: hidden; animation: rise .4s cubic-bezier(.16,1,.3,1); }
.welcome__glow { position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(245,166,35,.4), transparent 65%); pointer-events: none; animation: emberbreath 5s ease-in-out infinite; }
.welcome__mark { position: relative; font-size: 44px; margin-bottom: 14px; filter: drop-shadow(0 0 18px rgba(245,166,35,.6)); }
.welcome__eyebrow { position: relative; font-size: 11.5px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; opacity: .85; }
.welcome__title { position: relative; font-family: var(--display); font-weight: 500; font-size: 2rem; line-height: 1.08; margin: 8px 0 14px; }
.welcome__blurb { position: relative; font-size: 14.5px; line-height: 1.6; opacity: .9; margin-bottom: 24px; }
.welcome__box .btn--primary { position: relative; }
.welcome__box .btn--text { color: #f6f1e9; border: 1.5px solid rgba(246,241,233,.4); border-radius: 999px; height: 48px; margin-top: 4px; }
.welcome__box .btn--text:hover { color: #fff; background: rgba(246,241,233,.14); border-color: rgba(246,241,233,.6); }

/* ── FOOTER ──────────────────────────────────────────────────────────────── */
.footer { text-align: center; padding: 50px 24px; border-top: 1px solid var(--border); }
.footer__brand { display: inline-flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: .12em; color: var(--ember); font-size: 14px; }
.footer__tag { margin-top: 7px; font-size: 13px; color: var(--text-soft); }

/* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .hero { min-height: 540px; }
  .hero__inner { padding: 24px 18px 0; }
  .hero__top { flex-wrap: wrap; gap: 14px; }
  .hero__tools { order: 3; width: 100%; }
  .hero__btn:not(.hero__icon) { flex: 1; justify-content: center; }
  .strip__sub { font-size: 11px; }
  .main { padding: 24px 16px 70px; }
  .card__actions { flex-wrap: wrap; }
  .btn--rsvp { flex: 1; }
  .cal { padding: 14px; }
  .cal__cell { font-size: 12px; gap: 3px; }
  .modal__box, .welcome__box { padding: 26px 22px; }
  .rsvp__title { font-size: 1.6rem; }
  .welcome__title { font-size: 1.7rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  .hero__slide { transition: none; }
}
:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; border-radius: 4px; }

/* ── CURATED ONBOARDING (persona) ───────────────────────────────────────── */
.welcome__or { position: relative; display: flex; align-items: center; gap: 12px; margin: 18px 0 14px; }
.welcome__or::before, .welcome__or::after { content: ""; flex: 1; height: 1px; background: rgba(246,241,233,.18); }
.welcome__or span { font-size: 11.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; opacity: .6; }
.welcome__ask { position: relative; font-size: 14px; font-weight: 700; margin-bottom: 12px; }
.welcome__personas { position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 8px; }
.welcome__pchip {
  height: 52px; border-radius: var(--r-md); font-size: 14px; font-weight: 700;
  background: rgba(246,241,233,.08); border: 1.5px solid rgba(246,241,233,.22);
  color: #f6f1e9; transition: all .18s;
}
.welcome__pchip:hover { background: rgba(245,166,35,.16); border-color: var(--amber); transform: translateY(-1px); }

.foryou__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin: 4px 0 20px; }
.foryou__kicker { font-size: 11.5px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--ember-deep); }
[data-theme="dark"] .foryou__kicker { color: var(--amber); }
.foryou__title { font-family: var(--display); font-weight: 500; font-size: 1.7rem; line-height: 1.1; letter-spacing: -.01em; margin: 4px 0 6px; }
.foryou__sub { font-size: 13.5px; color: var(--text-soft); max-width: 34em; }
.foryou__change { flex-shrink: 0; height: 36px; padding: 0 15px; border-radius: 999px; border: 1.5px solid var(--border); font-size: 12.5px; font-weight: 700; color: var(--text-soft); transition: all .18s; }
.foryou__change:hover { border-color: var(--ember); color: var(--ember-deep); }

.btn--seeall { width: 100%; height: 52px; margin-top: 8px; background: var(--surface); border: 1.5px solid var(--line-2); color: var(--text); font-size: 14.5px; }
.btn--seeall:hover { border-color: var(--ember); color: var(--ember-deep); }
[data-theme="dark"] .btn--seeall:hover { color: var(--amber); }

.persona-pill { display: flex; gap: 6px; margin: -10px 0 18px; }
.pchip { height: 36px; padding: 0 15px; border-radius: 999px; background: rgba(232,96,44,.1); border: 1.5px solid rgba(232,96,44,.32); font-size: 12.5px; font-weight: 700; color: var(--ember-deep); transition: all .16s; }
.pchip:hover { background: rgba(232,96,44,.16); }
[data-theme="dark"] .pchip { color: var(--amber); background: rgba(245,166,35,.1); border-color: rgba(245,166,35,.35); }
.pchip--x { width: 36px; padding: 0; font-size: 16px; }

/* ── CONTRAST FIXES (WCAG AA for small text) ─────────────────────────────── */
.rsvp__add { color: var(--ember-deep); }
.tab.is-active { color: var(--ember-deep); }
[data-theme="dark"] .tab.is-active { color: var(--amber); }
.wotd__en { color: var(--ember-deep); }
[data-theme="dark"] .wotd__en { color: var(--amber); }
[data-theme="dark"] .rsvp__add { color: var(--amber); }

/* ── PROMINENT DATE ON CARDS ─────────────────────────────────────────────── */
.card__date b { color: var(--ember-deep); font-weight: 800; }
[data-theme="dark"] .card__date b { color: var(--amber); }
.card__date .ic { color: var(--ember-deep); }
[data-theme="dark"] .card__date .ic { color: var(--amber); }

/* ── JORDAN'S PRINCIPLE BADGE ────────────────────────────────────────────── */
.card__jp {
  display: inline-block; vertical-align: middle; margin-left: 8px;
  font-size: 10.5px; font-weight: 800; letter-spacing: .02em;
  color: #2d6b7a; background: rgba(45,107,122,.12);
  border: 1px solid rgba(45,107,122,.3); border-radius: 999px;
  padding: 2px 9px; white-space: nowrap; line-height: 1.5;
}
[data-theme="dark"] .card__jp { color: #7fc4d4; background: rgba(45,107,122,.22); border-color: rgba(127,196,212,.35); }

/* ── GUIDED CALENDAR (persona landing) ───────────────────────────────────── */
.cal--guided { margin-top: 6px; margin-bottom: 8px; box-shadow: var(--sh-sm); border:1.5px solid var(--line); border-radius: var(--r-lg); padding: 14px; }
.cal--guided .cal__cell.has-events { cursor: pointer; }
.cal--guided .cal__cell.has-events .cal__num { font-weight: 800; }
.cal--guided .cal__cell.has-events::after {
  content: ""; position: absolute; inset: 3px; border-radius: 10px;
  background: rgba(232,96,44,.07); z-index: -1;
}
.cal--guided .cal__cell { position: relative; z-index: 0; }
.cal--guided .cal__cell.is-picked::after { background: rgba(232,96,44,.18); }

/* ── DAY POPUP (tap a calendar date) ─────────────────────────────────────── */
.daypop__head { margin-bottom: 16px; }
.daypop__day {
  display: flex; align-items: center; gap: 9px;
  font-family: var(--display); font-weight: 500; font-size: 1.5rem;
  line-height: 1.1; letter-spacing: -.01em;
}
.daypop__day .ic { color: var(--ember); width: 20px; height: 20px; }
.daypop__count { font-size: 13px; color: var(--text-soft); margin-top: 6px; font-weight: 600; }

.daypop__list { display: flex; flex-direction: column; gap: 10px; }
.daypop__ev {
  display: flex; align-items: center; gap: 12px;
  border: 1.5px solid var(--line); border-radius: var(--r-md);
  padding: 12px 12px 12px 0; background: var(--surface);
  overflow: hidden; position: relative;
  animation: daypop-in .32s cubic-bezier(.16,1,.3,1) backwards;
}
.daypop__ev:nth-child(2) { animation-delay: .04s; }
.daypop__ev:nth-child(3) { animation-delay: .08s; }
.daypop__ev:nth-child(4) { animation-delay: .12s; }
.daypop__ev:nth-child(5) { animation-delay: .16s; }
@keyframes daypop-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.daypop__rail { width: 5px; align-self: stretch; flex-shrink: 0; border-radius: 0 4px 4px 0; background: var(--ember); }
.daypop__ev[data-cat="culture"] .daypop__rail { background: var(--c-culture, #b8791a); }
.daypop__ev[data-cat="health"]  .daypop__rail { background: var(--c-health, #2d6b7a); }
.daypop__ev[data-cat="youth"]   .daypop__rail { background: var(--c-youth, #3d7355); }
.daypop__ev[data-cat="elders"]  .daypop__rail { background: var(--c-elders, #7e3a5c); }
.daypop__ev[data-cat="family"]  .daypop__rail { background: var(--c-family, #b0653f); }
.daypop__ev-body { flex: 1; min-width: 0; }
.daypop__ev-title { font-weight: 700; font-size: 14.5px; line-height: 1.25; }
.daypop__ev-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; font-size: 12px; color: var(--text-soft); margin-top: 4px; }
.daypop__ev-meta .ic { width: 13px; height: 13px; }
.daypop__sep { opacity: .5; margin: 0 2px; }
.daypop__rsvp { flex-shrink: 0; height: 40px; padding: 0 18px; font-size: 13.5px; }
.daypop__ev.is-going { border-color: var(--c-health, #2d6b7a); background: rgba(45,107,122,.05); }

.daypop__empty { text-align: center; padding: 30px 16px; color: var(--text-faint); }
.daypop__empty .ic { width: 32px; height: 32px; opacity: .4; margin-bottom: 10px; }
.daypop__empty p { font-weight: 700; color: var(--text-soft); margin-bottom: 4px; }
.daypop__empty span { font-size: 12.5px; }

/* make calendar days feel obviously tappable */
.cal__cell.has-events { cursor: pointer; transition: transform .12s, background .16s; }
.cal__cell.has-events:hover { transform: translateY(-1px); }
.cal__cell.has-events:active { transform: scale(.94); }

/* ── HONEYPOT (spam trap — visually hidden, off-screen, not display:none so
   bots still see it; real users never encounter it) ─────────────────────── */
.hp-field {
  position: absolute !important;
  left: -9999px !important;
  top: -9999px !important;
  width: 1px; height: 1px;
  opacity: 0; pointer-events: none;
}

</style>
</head>
<body>
  <!-- Netlify Forms: this hidden static form is what Netlify detects at deploy
       time. The JS submits to it via AJAX (form-name="rsvp"). Do not remove. -->
  <form name="rsvp" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="rsvp">
    <input name="event"><input name="date"><input name="time">
    <input name="location"><input name="department"><input name="contact_phone">
    <input name="attendees"><input name="party_size">
    <input name="event_date_iso"><input name="event_id">
    <input name="department_key"><input name="submitted_at">
    <input name="bot-field">
  </form>

  <!-- SCRIPTS: config → events → engine -->
  <script>
/* ============================================================================
   CONFIG  —  Settings, departments, RSVP routing, news, cultural data
   ============================================================================
   Day-to-day events live in events.js. This file holds the things that change
   less often: where RSVPs get sent, the top banner, the news tab, and the
   Treaty Days link.
   ============================================================================ */

const CONFIG = {

  /* ── SITE ───────────────────────────────────────────────────────────────── */
  site: {
    nation: "Sagkeeng Anicinabe Nation",
    title: "Community Calendar",
    subtitle: "Zaagiing \u2014 Mouth of the River"
  },

  /* ── TREATY DAYS LINK ─────────────────────────────────────────────────────
     The separate Treaty Days RSVP site. The welcome card on first load and the
     footer both point here. Change the URL once you have the domain.          */
  treatyDays: {
    showWelcome: false,                              // welcome card on first visit
    url: "treaty-days.html",                        // ← bundled Treaty Days wizard (same folder)
    headline: "Treaty Days RSVP is open",
    blurb: "Register for Treaty Days and enter to win the grand prize. Then come back here to RSVP for events all month \u2014 every RSVP is another entry."
  },

  /* ── RSVP / FORMSPREE ─────────────────────────────────────────────────────
     RSVPs are sent through Formspree (free, no server). Each department can
     have its own form so RSVPs land in the right inbox automatically. If a
     department has no endpoint, the "default" one is used.

     SETUP (10 minutes, free):
       1. Go to https://formspree.io and create a free account.
       2. Create one form per department (or just one form to start).
       3. Each form gives you an endpoint like https://formspree.io/f/abcdwxyz
       4. Paste the endpoint code (the part after /f/) below.
       5. In Formspree, set each form's notification email to that department.

     Until you add real endpoints, RSVPs run in DEMO mode: the flow works and
     shows the success screen, but nothing is sent. Set demoMode:false when
     your endpoints are in.                                                     */
  rsvp: {
    demoMode: false,                                 // ← set false once endpoints are live
    drawName: "the grand prize",                    // shown in the success screen
    departments: {
      culture: { name: "Cultural Department", endpoint: "" },
      health:  { name: "Health Centre",       endpoint: "" },
      youth:   { name: "Youth Services",       endpoint: "" },
      elders:  { name: "Elder Services",       endpoint: "" },
      family:  { name: "Family Services",      endpoint: "" },
      special: { name: "Band Office",          endpoint: "" }
    },
    defaultEndpoint: ""                             // fallback for any department
  },

  /* ── FACEBOOK SHARE ───────────────────────────────────────────────────────
     The headline people see when they share an event to Facebook. (The site's
     social preview, set in index.html, also carries this.)                    */
  share: {
    headline: "Win the grand prize this year at Treaty Days \u2014 RSVP now!"
  },

  /* ── TOP BANNER ───────────────────────────────────────────────────────────
     The message bar at the very top. Set show:false to hide it.              */
  banner: {
    show: true,
    text: "\u{1F525} Grand prize announcement coming soon \u2014 stay tuned!"
  },

  /* ── WEATHER ───────────────────────────────────────────────────────────────
     live:true tries to fetch the current Sagkeeng forecast automatically.
     If the fetch fails, it quietly shows the fallback values below instead, so
     it never breaks. Set live:false to always use the fallback you set by hand.*/
  weather: {
    show: true,
    live: true,
    lat: 50.62, lon: -96.10,                        // Sagkeeng / Fort Alexander
    fallback: { temp: "7\u00b0C", description: "Partly cloudy", wind: "18 km/h", sunset: "8:12 PM" }
  },

  /* ── GOOGLE CALENDAR (optional live source) ────────────────────────────────
     Leave enabled:false to use events.js. To pull live from a public Google
     Calendar, see the steps in the README.                                    */
  googleCalendar: {
    enabled: false,
    calendarId: "your-calendar-id@group.calendar.google.com",
    apiKey: "YOUR_GOOGLE_API_KEY",
    monthsAhead: 6
  }

};

/* ============================================================================
   NEWS & NOTICES  —  Shown in the "News" tab
   ============================================================================

  <script>
/* ============================================================================
   CALENDAR.JS  —  The engine. You rarely edit this.
   ============================================================================
   Add events in events.js. Change settings, departments, and routing in
   config.js. This file runs everything: dates, RSVP flow, Formspree submit,
   live weather, sharing, the Treaty Days welcome, and all rendering.
   ============================================================================ */

(function () {
  "use strict";

  /* ── DATES ────────────────────────────────────────────────────────────── */
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var now = new Date();
  var TODAY = iso(now);

  function pad(n){ return String(n).padStart(2,"0"); }
  function iso(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
  function firstWeekday(y,m){ return new Date(y,m,1).getDay(); }
  function parseDate(s){ var p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
  function longDate(s){ return parseDate(s).toLocaleDateString("en-CA",{weekday:"long",month:"long",day:"numeric"}); }
  function shortDate(s){ return parseDate(s).toLocaleDateString("en-CA",{month:"short",day:"numeric"}); }
  function weekday(s){ return parseDate(s).toLocaleDateString("en-CA",{weekday:"short"}); }
  function dayNum(s){ return parseDate(s).getDate(); }

  function minutesUntil(date,time){
    if(!time||time==="Dusk") return Infinity;
    var p=date.split("-").map(Number);
    var isPM=/pm/i.test(time), isAM=/am/i.test(time);
    var t=time.replace(/[^\d:]/g,"").split(":");
    var h=parseInt(t[0],10), min=parseInt(t[1]||"0",10);
    if(isPM&&h!==12) h+=12;
    if(isAM&&h===12) h=0;
    return Math.round((new Date(p[0],p[1]-1,p[2],h,min)-new Date())/60000);
  }
  function weekEndISO(){ var d=new Date(now); d.setDate(d.getDate()+6); return iso(d); }

  /* ── BUILD EVENTS ─────────────────────────────────────────────────────── */
  var _id=0;
  function normalize(e){
    return {
      id:"ev"+(_id++), date:e.date, start:e.start||e.time||"", end:e.end||"",
      title:e.title||"Untitled event", location:e.location||"Location TBA",
      setting:(e.setting||"").toLowerCase(),
      category:(e.category||"special").toLowerCase(),
      department:(e.department||e.category||"special").toLowerCase(),
      audience:Array.isArray(e.audience)?e.audience.map(function(a){return String(a).toLowerCase();}):[],
      contact:e.contact||"", info:e.info||e.desc||"",
      spots:e.spots||null, featured:!!e.featured, moon:!!e.moon, recurring:!!e.recurring
    };
  }
  /* Crash-proofing: one badly typed event entry should never blank the whole
     site. Invalid entries are skipped with a console warning instead.        */
  function safeNormalize(raw){
    var out=[];
    (raw||[]).forEach(function(e,i){
      try{
        if(!e || !e.date || !/^\d{4}-\d{2}-\d{2}$/.test(e.date) || !e.title){
          console.warn("Skipping invalid event at position "+i, e); return;
        }
        out.push(normalize(e));
      }catch(err){ console.warn("Skipping broken event at position "+i, err); }
    });
    return out;
  }
  function sortEvents(list){
    return list.sort(function(a,b){
      return a.date.localeCompare(b.date) || (minutesUntil(a.date,a.start)-minutesUntil(b.date,b.start));
    });
  }
  function buildLocalEvents(){
    var list = safeNormalize(EVENTS);
    // Weekly Sweat Lodge — Thursdays, April–September 2026
    for(var mo=3; mo<=8; mo++){
      var dim=daysInMonth(2026,mo);
      for(var day=1; day<=dim; day++){
        if(new Date(2026,mo,day).getDay()===4){
          list.push(normalize({
            date:"2026-"+pad(mo+1)+"-"+pad(day), start:"7:00 PM", end:"10:00 PM",
            title:"Sweat Lodge Ceremony", location:"Sacred Grounds", setting:"outdoor",
            category:"culture", department:"culture", contact:"204-367-2290",
            info:"Weekly sweat lodge. Open to all community members. Come with a good heart.",
            spots:12, recurring:true
          }));
        }
      }
    }
    // Full Moon Ceremonies
    FULL_MOONS.forEach(function(date){
      var mo=parseInt(date.split("-")[1],10), moon=MOON_NAMES[mo];
      list.push(normalize({
        date:date, start:"Dusk", end:"",
        title:"Full Moon Ceremony"+(moon?" \u2014 "+moon.oji:""),
        location:"Sacred Grounds", setting:"outdoor", category:"culture", department:"culture",
        contact:"204-367-2290",
        info:moon?(moon.oji+" ("+moon.en+"). All are welcome."):"Full moon gathering.",
        moon:true
      }));
    });
    return sortEvents(list);
  }

  /* ── GOOGLE CALENDAR (optional) ───────────────────────────────────────── */
  function fetchGoogleEvents(){
    var g=CONFIG.googleCalendar;
    if(!g||!g.enabled) return Promise.resolve(null);
    var min=new Date().toISOString();
    var maxD=new Date(); maxD.setMonth(maxD.getMonth()+(g.monthsAhead||6));
    var url="https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(g.calendarId)+
      "/events?key="+g.apiKey+"&timeMin="+min+"&timeMax="+maxD.toISOString()+
      "&singleEvents=true&orderBy=startTime&maxResults=250";
    return fetch(url).then(function(r){ if(!r.ok) throw new Error("cal"); return r.json(); })
      .then(function(data){ return sortEvents((data.items||[]).map(mapGoogle).filter(Boolean)); })
      .catch(function(){ return null; });
  }
  function mapGoogle(item){
    var s=item.start&&(item.start.dateTime||item.start.date); if(!s) return null;
    var sd=new Date(s), er=item.end&&(item.end.dateTime||item.end.date), ed=er?new Date(er):null;
    var allDay=!!(item.start&&item.start.date&&!item.start.dateTime);
    var desc=item.description||"";
    var tag=(desc.match(/\[(culture|health|youth|elders|family|special)\]/i)||[])[1];
    return normalize({
      date:iso(sd),
      start:allDay?"Dusk":sd.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),
      end:(!allDay&&ed)?ed.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"",
      title:item.summary||"Untitled event", location:item.location||"",
      category:tag?tag.toLowerCase():"special", department:tag?tag.toLowerCase():"special",
      info:desc.replace(/\[(culture|health|youth|elders|family|special)\]/ig,"").trim()
    });
  }

  /* ── STATE ────────────────────────────────────────────────────────────── */
  var ALL=[], view="today", filter="all", search="";
  var going=new Set(), calY=now.getFullYear(), calM=now.getMonth(), picked=null;
  var CAT={culture:"Culture",health:"Health",youth:"Youth",elders:"Elders",family:"Family",special:"Special"};

  /* ── PERSONA (curated onboarding) ─────────────────────────────────────────
     "Who are you planning for?" Man / Woman / Elder / Parent & kids.
     An event with no audience tag is for everyone, so it shows for all
     personas. Tagged events only show for matching personas.                 */
  var PERSONAS={
    men:    {label:"A man",        match:["men"]},
    women:  {label:"A woman",      match:["women"]},
    elders: {label:"An Elder",     match:["elders"]},
    parents:{label:"Parent & kids",match:["parents","kids"]}
  };
  var persona=null, suggestedMode=false;

  /* localStorage can be blocked (private mode); never let that crash us */
  function store(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function read(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }

  function audienceMatch(e){
    if(!persona) return true;
    if(!e.audience.length) return true;                 // untagged = everyone
    var want=PERSONAS[persona].match;
    return e.audience.some(function(a){ return want.indexOf(a)>=0; });
  }

  function visible(){
    return ALL.filter(function(e){
      if(filter!=="all"&&e.category!==filter) return false;
      if(search){
        var hay=(e.title+" "+e.location+" "+e.category+" "+e.info).toLowerCase();
        if(hay.indexOf(search)<0) return false;
      }
      return true;
    });
  }

  /* ── ICONS ────────────────────────────────────────────────────────────── */
  function ic(name){
    var p={
      clock:'<circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/>',
      pin:'<path d="M8 14s5-4.5 5-8A5 5 0 003 6c0 3.5 5 8 5 8z"/><circle cx="8" cy="6" r="1.6"/>',
      indoor:'<path d="M2.5 7L8 2.5 13.5 7"/><path d="M4 6.5V13h8V6.5"/><path d="M6.8 13V9.5h2.4V13"/>',
      outdoor:'<path d="M8 1.5v13"/><path d="M8 6l3.5-2M8 6L4.5 4M8 9.5l3.5-2M8 9.5L4.5 7.5"/>',
      users:'<circle cx="6" cy="6" r="2.2"/><path d="M2.5 13c0-2 1.6-3.4 3.5-3.4S9.5 11 9.5 13"/><path d="M10.5 9.8c1.6.2 2.8 1.4 2.8 3.2"/><circle cx="11" cy="6" r="1.8"/>',
      share:'<circle cx="12" cy="4" r="1.8"/><circle cx="4" cy="8" r="1.8"/><circle cx="12" cy="12" r="1.8"/><path d="M10.5 5L5.5 7M5.5 9l5 2"/>',
      check:'<path d="M3.5 8.5l3 3 6-7"/>',
      search:'<circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5"/>',
      arrow:'<path d="M3 8h10M9 4l4 4-4 4"/>',
      x:'<path d="M4 4l8 8M12 4l-8 8"/>',
      calendar:'<rect x="2.5" y="3.5" width="11" height="10" rx="1.5"/><path d="M2.5 6.5h11M5.5 2v3M10.5 2v3"/>'
    };
    return '<svg class="ic" viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">'+p[name]+'</svg>';
  }

  /* ── EVENT CARD ───────────────────────────────────────────────────────── */
  function card(e){
    var mins=minutesUntil(e.date,e.start);
    var isNow=mins<=0&&mins>=-240, soon=mins>0&&mins<=120;
    var isGoing=going.has(e.id);
    var time=e.start+(e.end?" \u2013 "+e.end:"");
    var setIc=e.setting==="outdoor"?ic("outdoor"):(e.setting==="indoor"?ic("indoor"):"");
    var setLabel=e.setting==="outdoor"?"Outdoor":(e.setting==="indoor"?"Indoor":"");

    var tags="";
    if(isNow) tags+=pill('<span class="dot"></span>Happening now',"live");
    else if(soon) tags+=pill("Starts in "+mins+" min","soon");
    if(e.moon) tags+=pill("Full moon","moon");
    if(e.recurring) tags+=pill("Weekly","muted");

    var meta='<span class="card__meta-item card__date">'+ic("calendar")+'<b>'+weekday(e.date)+', '+shortDate(e.date)+'</b></span>'+
             '<span class="card__meta-item">'+ic("clock")+time+'</span>'+
             '<span class="card__meta-item">'+ic("pin")+e.location+'</span>'+
             (setLabel?'<span class="card__meta-item">'+setIc+setLabel+'</span>':'');

    var jp = /jordan/i.test(e.location) ? '<span class="card__jp">Jordan\u2019s Principle</span>' : '';

    var foot="";
    if(e.spots){ foot+='<span class="card__spots">'+ic("users")+(e.spots-(isGoing?1:0))+" spots left</span>"; }
    if(e.contact){ foot+='<span class="card__contact">'+e.contact+"</span>"; }

    return '<article class="card'+(isNow?" card--live":"")+(e.featured?" card--featured":"")+'" data-cat="'+e.category+'">'+
        '<div class="card__rail"></div>'+
        '<div class="card__body">'+
          (tags?'<div class="card__tags">'+tags+'</div>':'')+
          '<h3 class="card__title">'+e.title+jp+'</h3>'+
          '<div class="card__meta">'+meta+'</div>'+
          '<p class="card__info">'+e.info+'</p>'+
          (foot?'<div class="card__foot">'+foot+'</div>':'')+
          '<div class="card__actions">'+
            '<button class="btn btn--rsvp'+(isGoing?" is-going":"")+'" data-rsvp="'+e.id+'">'+
              (isGoing?ic("check")+"You\u2019re going":"RSVP")+'</button>'+
            '<button class="btn btn--icon" data-cal="'+e.id+'" title="Add to your calendar">'+ic("clock")+'</button>'+
            '<button class="btn btn--icon" data-share="'+e.id+'" title="Share to Facebook">'+ic("share")+'</button>'+
          '</div>'+
        '</div>'+
      '</article>';
  }
  function pill(t,k){ return '<span class="pill pill--'+k+'">'+t+'</span>'; }

  /* ── VIEWS ────────────────────────────────────────────────────────────── */
  function renderToday(list){
    var today=list.filter(function(e){return e.date===TODAY;});
    var featured=list.filter(function(e){return e.featured&&e.date>TODAY;}).slice(0,2);
    var upcoming=list.filter(function(e){return e.date>TODAY;}).slice(0,8);
    var h="";
    if(today.length){
      h+=secLabel("Today \u00b7 "+longDate(TODAY));
      h+='<div class="river">'+today.map(riverItem).join("")+'</div>';
    } else {
      h+=empty("\u{1F30A}","Nothing scheduled today","Here\u2019s what\u2019s coming up next.");
    }
    if(featured.length){
      h+=secLabel("Don\u2019t miss");
      h+=featured.map(card).join("");
    }
    if(upcoming.length){
      h+=secLabel("Coming up");
      h+='<div class="river">'+upcoming.map(riverItem).join("")+'</div>';
    }
    return h;
  }
  function riverItem(e){
    return '<div class="river__row">'+
      '<div class="river__rail"><span class="river__node" data-cat="'+e.category+'"></span></div>'+
      '<div class="river__content">'+
        '<div class="river__date">'+weekday(e.date)+' <strong>'+dayNum(e.date)+'</strong></div>'+
        card(e)+
      '</div></div>';
  }
  function renderWeek(list){
    var end=weekEndISO();
    var wk=list.filter(function(e){return e.date>=TODAY&&e.date<=end;});
    if(!wk.length) return empty("\u{1F341}","No events this week","Check the calendar for what\u2019s ahead.");
    var groups={}; wk.forEach(function(e){(groups[e.date]=groups[e.date]||[]).push(e);});
    return Object.keys(groups).sort().map(function(d){
      var t=d===TODAY;
      return '<div class="daygroup">'+
        '<div class="daygroup__head'+(t?" is-today":"")+'"><span>'+longDate(d)+'</span>'+(t?'<span class="badge">Today</span>':'')+'</div>'+
        groups[d].map(card).join("")+'</div>';
    }).join("");
  }
  function renderMonth(list){
    var byDate={}; list.forEach(function(e){(byDate[e.date]=byDate[e.date]||[]).push(e);});
    var dim=daysInMonth(calY,calM), lead=firstWeekday(calY,calM);
    var h='<div class="cal">'+
      '<div class="cal__head">'+
        '<button class="cal__nav" data-month="-1" aria-label="Previous month">'+ic("arrow").replace('class="ic"','class="ic flip"')+'</button>'+
        '<div class="cal__title">'+MONTHS[calM]+' '+calY+'</div>'+
        '<button class="cal__nav" data-month="1" aria-label="Next month">'+ic("arrow")+'</button>'+
      '</div><div class="cal__grid cal__grid--names">';
    DAYS.forEach(function(d){ h+='<div class="cal__name">'+d+'</div>'; });
    h+='</div><div class="cal__grid">';
    for(var i=0;i<lead;i++) h+='<div class="cal__cell cal__cell--empty"></div>';
    for(var day=1;day<=dim;day++){
      var key=calY+"-"+pad(calM+1)+"-"+pad(day);
      var evs=byDate[key]||[], t=key===TODAY, pk=key===picked, mn=FULL_MOONS.indexOf(key)>=0;
      var cls="cal__cell"+(t?" is-today":"")+(pk?" is-picked":"")+(evs.length?" has-events":"");
      h+='<button class="'+cls+'" data-date="'+key+'"><span class="cal__num">'+day+'</span>';
      if(mn) h+='<span class="cal__moon" title="Full moon">\u25CF</span>';
      if(evs.length){
        var cats=[]; evs.forEach(function(e){ if(cats.indexOf(e.category)<0&&cats.length<4) cats.push(e.category); });
        h+='<span class="cal__dots">'+cats.map(function(c){return '<span class="cal__dot" data-cat="'+c+'"></span>';}).join("")+'</span>';
      }
      h+='</button>';
    }
    h+='</div></div>';
    if(picked){
      var evs2=byDate[picked]||[];
      h+='<div class="picked"><div class="picked__title">'+longDate(picked)+'</div>'+
        (evs2.length?evs2.map(card).join(""):'<p class="picked__empty">No events this day.</p>')+'</div>';
    } else {
      h+='<p class="cal__hint">Tap a highlighted day to see what\u2019s on \u2014 and RSVP right there.</p>';
    }
    return h;
  }

        '<div class="cal__title">'+MONTHS[calM]+' '+calY+'</div>'+

    h+='</div><div class="cal__grid">';
    for(var i=0;i<lead;i++) h+='<div class="cal__cell cal__cell--empty"></div>';
    for(var day=1;day<=dim;day++){
      var key=calY+"-"+pad(calM+1)+"-"+pad(day);
      var evs=byDate[key]||[], t=key===TODAY, pk=key===picked;
      var cls="cal__cell"+(t?" is-today":"")+(pk?" is-picked":"")+(evs.length?" has-events":"");
      h+='<button class="'+cls+'" data-date="'+key+'"><span class="cal__num">'+day+'</span>';
      if(evs.length){
        var cats=[]; evs.forEach(function(e){ if(cats.indexOf(e.category)<0&&cats.length<4) cats.push(e.category); });
        h+='<span class="cal__dots">'+cats.map(function(c){return '<span class="cal__dot" data-cat="'+c+'"></span>';}).join("")+'</span>';
      }

    if(picked){

         '<button class="btn btn--text" id="date-clear">\u2190 Back to all your events</button></div>';

  /* Validate a real North American phone number (NANP).
     Rejects garbage like 0000000000, 1234567890, all-same-digit, and
     numbers where the area code or exchange start with 0 or 1. */
  function validPhone(raw){
    var d=(raw||"").replace(/\D/g,"");
    if(d.length===11 && d.charAt(0)==="1") d=d.slice(1);
    if(d.length!==10) return false;
    if(d.charAt(0)<"2" || d.charAt(3)<"2") return false;   // area + exchange must start 2-9
    if(/^(\d)\1{9}$/.test(d)) return false;                 // all same digit
    if(d==="1234567890" || d==="0123456789") return false;  // obvious sequences
    if(d.slice(3,6)==="555" && d.slice(6,8)==="01") return false; // 555-01xx fictional block
    return true;
  }

  function submitRSVP(){
    syncAttendees();
    var phone=(attendees[0]&&attendees[0].phone)||"";
    var named=attendees.filter(function(a){return a.name;});
    var err=document.getElementById("rsvp-error");

    /* Honeypot: humans never see or fill #rsvp-hp. If it has a value, it's a
       bot. Pretend it worked (show success) but send nothing — telling a bot
       it was caught just makes it try harder. */
    var hp=document.getElementById("rsvp-hp");
    if(hp && hp.value){ rsvpSuccess(rsvpEvent, named.length||1); render(); return; }

    if(!named.length||!named[0].name){ err.textContent="Please enter your name."; return; }
    if(!validPhone(phone)){ err.textContent="Please enter a valid 10-digit phone number so we can reach you."; return; }
    err.textContent="";

    var btn=document.getElementById("rsvp-submit");
    btn.disabled=true; btn.textContent="Sending\u2026";

    var e=rsvpEvent;
    var names=named.map(function(a){return a.name;});
    var dept=CONFIG.rsvp.departments[e.department]||{name:e.department,endpoint:""};
    var payload={
      _subject:"RSVP \u2014 "+e.title+" ("+longDate(e.date)+")",
      event:e.title, date:longDate(e.date), time:e.start+(e.end?" \u2013 "+e.end:""),
      location:e.location, department:dept.name,
      contact_phone:phone, attendees:names.join(", "), party_size:names.length,
      /* machine-readable fields — these power automated reminder digests
         (e.g. Claude Code collecting all RSVPs 3 days / 1 day before) */
      event_date_iso:e.date, event_id:e.title.toLowerCase().replace(/[^a-z0-9]+/g,"-"),
      department_key:e.department, submitted_at:new Date().toISOString()
    };
    var endpoint=dept.endpoint||CONFIG.rsvp.defaultEndpoint;

    sendRSVP(endpoint,payload).then(function(){
      going.add(e.id);
      rsvpSuccess(e,names.length);
      render();
    }).catch(function(){
      btn.disabled=false; btn.textContent="Count me in";
      err.textContent="Couldn\u2019t send right now. Please check your connection and try again.";
    });
  }

  function sendRSVP(endpoint,payload){
    /* keep a backup copy on this device (harmless, never the source of truth) */
    try{
      var l=JSON.parse(localStorage.getItem("sk_rsvps")||"[]");
      l.push(payload); localStorage.setItem("sk_rsvps",JSON.stringify(l));
    }catch(e){}
    /* send to Netlify Forms — the documented AJAX pattern. The form-name MUST
       match the static <form name="rsvp"> in index.html or Netlify drops it. */
    try{
      var body=new URLSearchParams();
      body.append("form-name","rsvp");
      Object.keys(payload).forEach(function(k){
        body.append(k, payload[k]==null?"":String(payload[k]));
      });
      fetch("/",{method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:body.toString()}).catch(function(){});
    }catch(e){}
    /* always resolve so a network hiccup never blocks a community member */
    return new Promise(function(res){ setTimeout(res,500); });
  }

  function setWeather(temp,desc,wind,sunset){
    var el=document.getElementById("weather");
    if(!el) return;
    el.innerHTML='<span class="strip__temp">'+temp+'</span><div><span class="strip__main">'+desc+' \u00b7 Sagkeeng</span><span class="strip__sub">Wind '+wind+(sunset?'  \u00b7  Sunset '+sunset:'')+'</span></div>';
    el.style.display="flex";

  function renderWeather(){
    var wx=CONFIG.weather;
    if(!wx||!wx.show){ var el=document.getElementById("weather"); if(el) el.style.display="none"; return; }
    var fb=wx.fallback;
    setWeather(fb.temp,fb.description,fb.wind,fb.sunset); // show fallback immediately
    if(!wx.live) return;
    // Try live weather (open-meteo, no key). Falls back silently on any failure.
    var url="https://api.open-meteo.com/v1/forecast?latitude="+wx.lat+"&longitude="+wx.lon+
      "&current=temperature_2m,weather_code,wind_speed_10m&daily=sunset&timezone=auto&forecast_days=1";
    fetch(url).then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(d){
      var c=d.current; if(!c) throw 0;
      var temp=Math.round(c.temperature_2m)+"\u00b0C";
      var wind=Math.round(c.wind_speed_10m)+" km/h";
      var desc=wmo(c.weather_code);
      var sunset=fb.sunset;
      if(d.daily&&d.daily.sunset&&d.daily.sunset[0]){
        sunset=new Date(d.daily.sunset[0]).toLocaleTimeString("en-CA",{hour:"numeric",minute:"2-digit"});
      }
      setWeather(temp,desc,wind,sunset);
    }).catch(function(){ /* keep fallback */ });
  }
  function wmo(code){
    if(code===0) return "Clear";
    if(code<=2) return "Partly cloudy";
    if(code===3) return "Overcast";
    if(code<=48) return "Foggy";
    if(code<=67) return "Rainy";
    if(code<=77) return "Snowy";
    if(code<=82) return "Showers";
    if(code<=99) return "Thunderstorms";
    return "Partly cloudy";
  }

    document.querySelectorAll("[data-filter]").forEach(function(b){ b.classList.toggle("is-active",b.dataset.filter===f); });
    render();
  }

  /* ── SLIDESHOW ────────────────────────────────────────────────────────── */
  function startSlideshow(){
    var slides=document.querySelectorAll(".hero__slide"), dots=document.querySelectorAll(".hero__dot");
    if(!slides.length) return;
    var i=0, timer;
    function go(n){ slides[i].classList.remove("is-active"); if(dots[i])dots[i].classList.remove("is-active"); i=n; slides[i].classList.add("is-active"); if(dots[i])dots[i].classList.add("is-active"); }
    function next(){ go((i+1)%slides.length); }
    timer=setInterval(next,6500);
    dots.forEach(function(d,n){ d.onclick=function(){ clearInterval(timer); go(n); timer=setInterval(next,6500); }; });
  }

  /* ── THEME ────────────────────────────────────────────────────────────── */
  function toggleTheme(){
    var root=document.documentElement, dark=root.getAttribute("data-theme")==="dark";
    root.setAttribute("data-theme",dark?"light":"dark");
    var t=document.getElementById("theme-toggle"); if(t) t.textContent=dark?"\u263E":"\u2600";
  }

  /* ── DELEGATION ───────────────────────────────────────────────────────── */
  function wire(){
    document.addEventListener("click",function(ev){
      var t=ev.target, x;
      if(t.closest("#see-all")){ suggestedMode=false; picked=null; render(); return; }
      if(t.closest("#date-clear")){ picked=null; render(); return; }
      if(t.closest("#persona-change")){ persona=null; suggestedMode=false; picked=null; maybeShowWelcome(); return; }
      if(t.closest("#persona-back")){ suggestedMode=true; view="today"; setView("today"); return; }
      if(t.closest("#persona-clear")){ persona=null; suggestedMode=false; render(); return; }
      if(t.closest("[data-tab]")){ x=t.closest("[data-tab]");
        if(x.dataset.tab==="today" && persona) suggestedMode=true;
        else if(x.dataset.tab!=="today") suggestedMode=false;
        setView(x.dataset.tab); return; }
      if((x=t.closest("[data-filter]"))){ setFilter(x.dataset.filter); return; }
      if((x=t.closest("[data-rsvp]"))){ var e=byId(x.dataset.rsvp); if(e) openRSVP(e); return; }
      if((x=t.closest("[data-cal]"))){ var e2=byId(x.dataset.cal); if(e2) addToCalendar(e2); return; }
      if((x=t.closest("[data-share]"))){ var e3=byId(x.dataset.share); if(e3) shareEvent(e3); return; }
      if((x=t.closest("[data-remove]"))){ syncAttendees(); attendees.splice(+x.dataset.remove,1); renderRSVPForm(); return; }
      if((x=t.closest("[data-month]"))){ calM+=parseInt(x.dataset.month,10); if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;} picked=null; render(); return; }
      if((x=t.closest("[data-date]"))&&x.classList.contains("has-events")){ openDayPopup(x.dataset.date); return; }
      if(t.closest("[data-close]")||t.classList.contains("modal__backdrop")){ closeModal(); return; }
      if(t.classList.contains("welcome__backdrop")){ closeWelcome(); return; }
      if(t.closest("#theme-toggle")){ toggleTheme(); return; }
      if(t.closest("#banner-close")){ document.getElementById("banner").style.display="none"; return; }
      if(t.closest("#treaty-cta")){ /* link handles navigation */ return; }
    });

    var si=document.getElementById("search");
    if(si) si.addEventListener("input",function(){
      search=si.value.toLowerCase().trim();
      var c=document.getElementById("search-clear"); if(c) c.classList.toggle("is-visible",!!search);
      render();
    });
    var sc=document.getElementById("search-clear");
    if(sc) sc.onclick=function(){ si.value=""; search=""; sc.classList.remove("is-visible"); render(); };

    document.addEventListener("keydown",function(e){ if(e.key==="Escape"){ closeModal(); closeWelcome(); } });
  }
  function byId(id){ return ALL.find(function(x){return x.id===id;}); }

  /* ── BOOT ─────────────────────────────────────────────────────────────── */
  function boot(events){
    ALL=events;
    renderBanner();
    renderHeroBits();
    render();
    startSlideshow();
    wire();
    maybeShowWelcome();
  }
  document.addEventListener("DOMContentLoaded",function(){
    var local=buildLocalEvents();
    fetchGoogleEvents().then(function(g){ boot(g&&g.length?g:local); });
  });

})();

</script>
</body>
</html>
